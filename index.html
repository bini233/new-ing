<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parnas Hotel Collection Special Offer</title>

<style>
  /* =========================================================
     기본 폰트 & 레이아웃
  ========================================================= */
  body {
    font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
    margin: 0;
    padding: 20px;
    background: #F7F7F7;
    display: flex;
    justify-content: center;
  }

  .page-wrapper {
    max-width: 1000px;
    width: 100%;
    background: #fff;
    padding: 25px;
    border-radius: 8px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.06);
  }

  .banner { width: 100%; border-radius: 8px; margin-bottom: 30px; overflow: hidden; }
  .banner img { width: 100%; height: auto; object-fit: contain; display: block; }
  h2 { margin-top: 45px; font-size: 1.2em; border-left: 3px solid #2c3e50; padding-left: 10px; color: #2c3e50; }
  label { display: block; font-weight: 500; margin: 16px 0 6px; }
  label.required::after { content: " *"; color: #d33; font-weight: 700; vertical-align: super; font-size: 0.85em; }

  input[type="text"], input[type="number"], select {
    width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; background: #fff; box-sizing: border-box;
  }
  input[type="text"]:focus, select:focus { border-color: #2c3e50; outline: none; }
  input[type="text"].underline-only { border: none; border-bottom: 1px solid #ccc; border-radius: 0; padding: 10px 0; }

  /* =========================================================
     카테고리 & 가로 스크롤 리스트
  ========================================================= */
  .category-title { font-size: 1.1em; font-weight: 700; color: #333; margin: 30px 0 15px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
  
  .product-list {
    display: flex; gap: 16px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none;
  }
  .product-list::-webkit-scrollbar { display: none; }

  .product-card {
    min-width: 160px; max-width: 160px; flex-shrink: 0; cursor: pointer; border-radius: 8px; transition: transform 0.2s;
  }
  .product-card:hover { transform: translateY(-3px); }
  .product-card.active .img-container { border: 3px solid #2c3e50; }

  .img-container { width: 100%; height: 160px; background-color: #f5f5f5; border-radius: 8px; overflow: hidden; margin-bottom: 10px; border: 3px solid transparent; transition: border-color 0.2s; }
  .img-container img { width: 100%; height: 100%; object-fit: cover; }
  .product-card-title { font-size: 1em; font-weight: 600; color: #333; word-break: keep-all; text-align: center; }

  /* =========================================================
     상세 정보 영역 (좌우 분할 레이아웃)
  ========================================================= */
  .detail-container {
    display: none; background: #fdfdfd; border: 1px solid #e4e9ef; border-radius: 12px; padding: 25px; margin-top: 15px; animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

  .split-layout { display: flex; gap: 30px; }
  .detail-left { flex: 1; min-width: 0; }
  .detail-right { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: space-between; }

  /* 이미지 갤러리 */
  .main-img { width: 100%; height: 300px; object-fit: cover; border-radius: 8px; background: #eee; margin-bottom: 10px; }
  .thumb-list { display: flex; gap: 10px; }
  .thumb-img { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 2px solid transparent; opacity: 0.6; }
  .thumb-img:hover, .thumb-img.active { opacity: 1; border-color: #2c3e50; }

  /* 우측 상세 패널 */
  .dtl-title { font-size: 1.4em; font-weight: 700; color: #2c3e50; margin-bottom: 8px; margin-top: 0; }
  .dtl-desc { font-size: 0.9em; color: #666; margin-bottom: 20px; line-height: 1.5; }
  
  /* 상품 상세설명 내부 HTML 스타일 */
  .desc-formatted { font-size: 0.95em; color: #444; line-height: 1.6; margin-bottom: 20px; }
  .desc-formatted .desc-title { display: block; font-size: 1.15em; color: #2c3e50; margin-bottom: 8px; }
  .desc-formatted p { margin: 0 0 15px 0; word-break: keep-all; }
  .desc-formatted .desc-subtitle { display: block; font-size: 1.05em; color: #333; margin-bottom: 8px; }
  .desc-formatted ul { margin: 0 0 15px 0; padding-left: 20px; }
  .desc-formatted li { margin-bottom: 4px; }
  .desc-formatted .desc-note { font-size: 0.85em; color: #888; margin-bottom: 0; }
  
  .option-box { background: #f7f9fb; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #eee;}
  .option-box label { margin-top: 0; font-size: 0.9em; color: #444; }
  
  /* 수량 및 금액 */
  .qty-price-row { display: flex; justify-content: space-between; align-items: flex-end; margin-top: 15px; }
  .qty-stepper { display: inline-flex; align-items: center; gap: 8px; }
  .qty-stepper input { width: 60px; padding: 6px 0; text-align: center; border: 1px solid #ccc; font-weight: bold; border-radius: 4px; }
  .qty-btn { width: 32px; height: 32px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; font-size: 16px; }
  
  .dtl-total-price { font-size: 1.3em; font-weight: 800; color: #2c3e50; }

  .btn-add-cart { width: 100%; padding: 14px; background: #2c3e50; color: #fff; border: none; border-radius: 6px; margin-top: 20px; font-size: 1.05em; font-weight: 600; cursor: pointer; transition: 0.2s; }
  .btn-add-cart:hover { background: #1a252f; }
  
  /* 모바일 대응 */
  @media (max-width: 768px) {
    .split-layout { flex-direction: column; }
    .main-img { height: auto; aspect-ratio: 1/1; }

  ========================================================= */
  .cart-area { margin-top: 40px; }

  .cart-item-info { flex: 1; }
  .cart-item-title { font-weight: 700; color: #333; margin-bottom: 4px; }
  .cart-item-opt { font-size: 0.85em; color: #666; }
  .cart-item-price { font-weight: 700; color: #2c3e50; margin-left: 15px; }
  .btn-delete { background: none; border: none; color: #d33; font-size: 1.2em; cursor: pointer; padding: 5px; margin-left: 10px; }

  .total-box { margin-top: 10px; padding: 20px; background: #2c3e50; color: #fff; border-radius: 8px; font-size: 1.2em; display: flex; justify-content: space-between; align-items: center; }

  .info-box, .consent-box { border: 1px solid #cfd6dd; border-radius: 10px; padding: 16px; margin: 18px 0; }
  .hidden { display: none !important; }

      <div class="img-container"><img src="${item.images[0]}" alt="${item.name}"></div>
      <div class="product-card-title">${item.name}</div>
      <div style="text-align:center; font-size:0.9em; color:#555; margin-top:4px;">${basePrice}${optLabel}</div>
    `;
    
    card.addEventListener("click", () => openDetailView(item, section, card));
    list.appendChild(card);
  });
  
  section.appendChild(list);
  
  // 카테고리별로 상세창이 열릴 앵커 포인트
  const anchor = document.createElement("div");
  anchor.className = "detail-anchor";
  section.appendChild(anchor);
  
  galleryArea.appendChild(section);
});

/* =========================================================
   상세 뷰 로직
========================================================= */
const dtlMainImg = document.getElementById("dtlMainImg");
const dtlThumbList = document.getElementById("dtlThumbList");
const dtlTitle = document.getElementById("dtlTitle");
const dtlDesc = document.getElementById("dtlDesc");
const dtlOptionLabel = document.getElementById("dtlOptionLabel");
const dtlOptionSelect = document.getElementById("dtlOptionSelect");
const dtlQty = document.getElementById("dtlQty");
const dtlPriceCalc = document.getElementById("dtlPriceCalc");

function openDetailView(item, sectionEl, cardEl) {
  currentItemObj = item;
  
  // 1. 카드 하이라이트
  document.querySelectorAll('.product-card').forEach(c => c.classList.remove('active'));
  cardEl.classList.add('active');

  // 2. 텍스트 바인딩
  dtlTitle.innerText = item.name;
  dtlDesc.innerHTML = item.desc || item.options[0].optDesc;
  
  // 3. 이미지 바인딩 (메인 & 썸네일)
  dtlMainImg.src = item.images[0];
  dtlThumbList.innerHTML = "";
  if(item.images.length > 1) {
    item.images.forEach((imgSrc, idx) => {
      const thumb = document.createElement("img");
      thumb.src = imgSrc;
      thumb.className = idx === 0 ? "thumb-img active" : "thumb-img";
      thumb.onclick = () => {
        dtlMainImg.src = imgSrc;
        document.querySelectorAll('.thumb-img').forEach(t => t.classList.remove('active'));
        thumb.classList.add('active');
      }
      dtlThumbList.appendChild(thumb);
    });
  }

  // 4. 옵션 셀렉트박스 렌더링
  dtlOptionSelect.innerHTML = "";
  item.options.forEach((opt, idx) => {
    const optEl = document.createElement("option");
    optEl.value = idx;
    optEl.text = `${opt.optName} (+${opt.price.toLocaleString()}원)`;
    dtlOptionSelect.appendChild(optEl);
  });
  
  // 옵션이 1개뿐인 경우 (배스웨어 등) 옵션 선택 UI 숨김 처리
  if (item.options.length <= 1) {
    dtlOptionLabel.style.display = "none";
    dtlOptionSelect.style.display = "none";
  } else {
    dtlOptionLabel.style.display = "block";
    dtlOptionSelect.style.display = "block";
  }
  
  // 수량 초기화 및 가격 계산
  dtlQty.value = 1;
  updateDetailPrice();

  // 5. 해당 카테고리 아래로 템플릿 이동 후 열기
  const anchor = sectionEl.querySelector('.detail-anchor');
  anchor.appendChild(detailTemplate);
  detailTemplate.style.display = "block";
}

/* 수량 및 금액 변경 이벤트 */
document.getElementById("dtlMinus").addEventListener("click", () => {
  let currentQty = parseInt(dtlQty.value) || 1;
  if (currentQty > 1) { dtlQty.value = currentQty - 1; updateDetailPrice(); }
});
document.getElementById("dtlPlus").addEventListener("click", () => {
  let currentQty = parseInt(dtlQty.value) || 1;
  dtlQty.value = currentQty + 1; updateDetailPrice();
});

dtlQty.addEventListener("input", () => {
  let val = parseInt(dtlQty.value);
  if (!isNaN(val) && val >= 1) {
    updateDetailPrice();
  }
});

dtlQty.addEventListener("blur", () => {
  let val = parseInt(dtlQty.value);
  if (isNaN(val) || val < 1) {
    dtlQty.value = 1;
    updateDetailPrice();
  }
});

dtlOptionSelect.addEventListener("change", updateDetailPrice);

function updateDetailPrice() {
  if(!currentItemObj) return;
  const optIdx = parseInt(dtlOptionSelect.value) || 0; 
  let qty = parseInt(dtlQty.value);
  if (isNaN(qty) || qty < 1) qty = 1; 
  const currentOption = currentItemObj.options[optIdx];
  
  if (currentOption.optDesc) {
    dtlDesc.innerHTML = currentOption.optDesc;
  } else if (currentItemObj.desc) {
    dtlDesc.innerHTML = currentItemObj.desc;
  }
  
  const unitPrice = currentOption.price;
  dtlPriceCalc.innerText = (unitPrice * qty).toLocaleString();
}

/* =========================================================
   장바구니(Cart) 로직
========================================================= */
document.getElementById("btnAddCart").addEventListener("click", () => {
  const optIdx = parseInt(dtlOptionSelect.value) || 0;
  let qty = parseInt(dtlQty.value);
  if (isNaN(qty) || qty < 1) qty = 1;
  
  const optionObj = currentItemObj.options[optIdx];
  
  const existingIdx = cart.findIndex(c => c.itemId === currentItemObj.id && c.optName === optionObj.optName);
  
  if (existingIdx > -1) {
    cart[existingIdx].qty += qty; 
  } else {
    cart.push({
      itemId: currentItemObj.id,
      itemName: currentItemObj.name,
      optName: optionObj.optName,
      unitPrice: optionObj.price,
      qty: qty
    });
  }
  
  if (currentItemObj.options.length <= 1) {
    alert(`${currentItemObj.name} ${qty}개가 담겼습니다.`);
  } else {
    alert(`${currentItemObj.name} [${optionObj.optName}] ${qty}개가 담겼습니다.`);
  }
  
  renderCart();
});

function renderCart() {
  const listEl = document.getElementById("cartList");
  const totalEl = document.getElementById("grandTotal");
  let html = "";
  let total = 0;

  if(cart.length === 0) {
    listEl.innerHTML = `<p style="color:#888; font-size:0.9em;">위에서 상품을 선택해 담아주세요.</p>`;
    totalEl.innerText = "0";
    return;
  }

  cart.forEach((c, idx) => {
    const rowPrice = c.unitPrice * c.qty;
    total += rowPrice;
    
    const isSingleOption = shopData.some(cat => 
      cat.items.some(item => item.id === c.itemId && item.options.length <= 1)
    );
    const optText = isSingleOption ? `수량: ${c.qty}개` : `옵션: ${c.optName} / 수량: ${c.qty}개`;

    html += `
      <div class="cart-item">
        <div class="cart-item-info">
          <div class="cart-item-title">${c.itemName}</div>
          <div class="cart-item-opt">${optText}</div>
        </div>
        <div class="cart-item-price">${rowPrice.toLocaleString()}원</div>
        <button type="button" class="btn-delete" onclick="removeCartItem(${idx})">✖</button>
      </div>
    `;
  });

  listEl.innerHTML = html;
  totalEl.innerText = total.toLocaleString();
}

function removeCartItem(idx) {
  cart.splice(idx, 1);
  renderCart();
}

/* =========================================================
   결제방식 토글 및 검증
========================================================= */
document.getElementById("paySelect").addEventListener("change", (e) => {
  const v = e.target.value;
  document.getElementById("bankArea").classList.toggle("hidden", v !== "계좌이체");
  document.getElementById("cardArea").classList.toggle("hidden", v !== "카드결제");
});

document.querySelectorAll(".phone-input").forEach(input => {
  input.addEventListener("input", () => input.value = input.value.replace(/\D/g, ""));
});

function validateForm() {
  if (cart.length === 0) {
    alert("장바구니에 담긴 상품이 없습니다.");
    return false;
  }
  
  let summaryText = cart.map(c => {
    const isSingleOption = shopData.some(cat => 
      cat.items.some(item => item.id === c.itemId && item.options.length <= 1)
    );
    return isSingleOption ? `- ${c.itemName} x ${c.qty}개` : `- ${c.itemName} [${c.optName}] x ${c.qty}개`;
  }).join("\n");
  
  document.getElementById("orderSummaryInput").value = summaryText;

  return confirm("현재 담으신 내역으로 주문서를 제출하시겠습니까?");
}
</script>
